<style>
  .ltw-table-row{
    border-bottom: 1px solid #ddd; 
    padding: .6rem 1rem; 
    margin: 0;
  }

  .ltw-table-header{
    background-color: #f7f7f7; 
    border-top-left-radius: inherit; 
    border-top-right-radius: inherit;
  }

  .ltw-table-footer{
    padding: .6rem 1rem; 
    background-color: #f7f7f7; 
    border-bottom-left-radius: inherit; 
    border-bottom-right-radius: inherit;
  }
</style>

<div class="container p-0">
  <div class="d-flex align-items-center">
    <div class="flex-grow-1">
      <h4 class="m-0">Eventi</h4>
    </div>
    <div class="flex-grow-1 text-end">
      <!-- Button trigger modal (modal is in dashboard.html for z-index issue) -->
      <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createEventModal">
        Crea evento
      </button>
    </div>
  </div>

  <form class="d-flex mt-3 mb-5 gap-2 gap-lg-4 flex-column flex-lg-row">
    <div class="d-flex flex-grow-1 align-items-center gap-3 form-floating">
      <input type="datetime-local" class="form-control flex-grow-1" id="datetimeFrom">
      <label for="datetimeFrom" class="form-label mb-0">Dal</label>
    </div>
    <div class="d-flex flex-grow-1 align-items-center gap-3 form-floating">
      <input type="datetime-local" class="form-control flex-grow-1" id="datetimeTo">
      <label for="datetimeTo" class="form-label mb-0">Al</label>
    </div>
    <div class="d-flex flex-grow-1 align-items-center gap-3 form-floating">
      <select class="form-select" id="eventType" aria-label="Default select example">
        <option value="Tutti">Tutti</option>
        <option value="Sereno">Sereno</option>
        <option value="Nuvoloso">Nuvoloso</option>
        <option value="Pioggia">Pioggia</option>
        <option value="Temporale">Temporale</option>
        <option value="Nebbia">Nebbia</option>
        <option value="Neve">Neve</option>
      </select>
      <label for="eventType">Tipologia</label>
    </div>
    <div class="d-flex flex-grow-1 align-items-center gap-3 form-floating">
      <a href="javascript:clearFilters()" class="text-decoration-none">Cancella</a>
    </div>
  </form>

  <div class="d-flex flex-column rounded-3 bg-white border border-secondary-subtle">
    <div class="row ltw-table-header ltw-table-row d-none d-lg-flex">
      <div class="col-xs-12 col-lg-2">Tipo</div>
      <div class="col-xs-12 col-lg-2">Autore</div>
      <div class="col-xs-12 col-lg-4">Riferimento</div>
      <div class="col-xs-12 col-lg-2">Data</div>
      <div class="col-xs-12 col-lg-2"></div>
    </div>

    <div class="ltw-table-body"></div>

    <div class="d-flex flex-grow-1 align-items-center gap-2 ltw-table-footer">
      <div style="flex: auto 0 0;">
        <nav aria-label="...">
          <ul class="pagination" style="margin: 0;">
            <li class="page-item">
              <a class="page-link"><</a>
            </li>
            <li class="page-item">
              <a class="page-link" href="#">></a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</div><!-- end container -->

<script type="text/javascript">
  function clearFilters(){
    $('#datetimeFrom, #datetimeTo').val('');
    $('#eventType').val('Tutti');
    loadEvents();
  }

  function deleteEvent(id){
    $.ajax({
      url: '/events/delete/'+id,
      method: 'POST',
      contentType: 'application/json',
      success: function(response) {
        showToast('Evento cancellato!', 'success');
        $('[data-ltw-event-id="'+id+'"]').remove();
      },
      error: function(error) {
        showToast('Impossibile eliminare l\'evento', 'danger');
      }
    });
  }

  function loadEvents(queryString = ''){
    var datetimeFrom = $('#datetimeFrom').val();
    var datetimeTo = $('#datetimeTo').val();
    var type = $('#eventType').val();

    const params = new URLSearchParams(queryString);

    if (datetimeFrom){ params.append('datetimeFrom', datetimeFrom); }
    if (datetimeTo){ params.append('datetimeTo', datetimeTo); }
    if (type){ params.append('type', type); }

    queryString = params.toString() ? '?' + params.toString() : '';

    fetch('/events'+queryString)
      .then(response => response.json())
      .then(events => {
        if (!events.events.length) {
          showToast('Nessun evento trovato', 'warning');
          return;
        }

        $('.ltw-table-body').empty();

        events.events.forEach((event) => {
          $('.ltw-table-body').append(`
            <div class="row ltw-table-row" data-ltw-event-id="${event.id}">
              <div class="col-xs-12 col-lg-2"><b class="d-lg-none">Tipo: </b>${event.type}</div>
              <div class="col-xs-12 col-lg-2"><b class="d-lg-none">Autore: </b>${event.customerName}</div>
              <div class="col-xs-12 col-lg-4"><b>Nome: </b>${event.name}<br/><b>Descrizione: </b>${event.description}</div>
              <div class="col-xs-12 col-lg-2"><b class="d-lg-none">Data: </b>${formatDateTime(event.datetime)}</div>
              <div class="col-xs-12 col-lg-2 mt-2 mt-lg-0 txt-start text-lg-center">
                <a href="javascript:deleteEvent(${event.id})"><i class="bi bi-trash3"></i></a>
              </div>
            </div>`);
        });

        $('.page-container').animate({ scrollTop: 0 }, 300);
        $('.pagination .page-item:first .page-link')
            .attr('href', 'javascript:loadEvents("?prevCursor='+events.prevCursor+'")');
        $('.pagination .page-item:last .page-link')
            .attr('href', 'javascript:loadEvents("?nextCursor='+events.nextCursor+'")');
      })
      .catch(error => {
        showToast('Errore recupero eventi', 'danger');
      });
  }

  $(document).ready(function() {
    $('#datetimeFrom, #datetimeTo, #eventType')
      .off('change')
      .on('change', function() {
        loadEvents();
    });

    $(document)
      .off('click', '#createEventModal .btn-primary')
      .on('click', '#createEventModal .btn-primary', function() {
        const eventData = {
          name: $('#createEventModal #eventName').val(),
          type: $('#createEventModal #eventType').val(),
          datetime: $('#createEventModal #eventDatetime').val(),
          description: $('#createEventModal #eventDescription').val()
        };

        if (eventData.name === "" || eventData.type === "" || eventData.date === "") {
          showToast('Compila i campi obbligatori', 'danger');
          return;
        }

        $.ajax({
          url: '/events',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify(eventData),
          success: function(response) {
            showToast('Evento salvato!', 'success');
            $('#createEventModal').modal('hide');
          },
          error: function(error) {
            showToast('Errore salvataggio', 'danger');
          }
        });
    });

    loadEvents();
  });
</script>
