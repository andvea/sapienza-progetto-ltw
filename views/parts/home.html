<div class="container p-0">
  <h4>Home</h4>
  <div class="d-flex flex-grow-1 flex-shrink-1 mt-3 slides gap-3" style="flex-wrap: wrap;">
    <div class="slide" style="width: 100%; background-color: white; border-radius: .75rem; box-shadow: rgba(0, 0, 0, 0.03) 0px 0.3125rem 0.3125rem -0.15625rem, rgba(0, 0, 0, 0.02) 0px 0.1875rem 0.1875rem -0.09375rem, rgba(0, 0, 0, 0.02) 0px 0.125rem 0.125rem -0.0625rem, rgba(0, 0, 0, 0.03) 0px 0.0625rem 0.0625rem -0.03125rem, rgba(0, 0, 0, 0.04) 0px 0.03125rem 0.03125rem 0px, rgba(0, 0, 0, 0.06) 0px 0px 0px 0.0625rem; padding: 20px;">
      <canvas id="myChart1"></canvas>
    </div>

    <div class="slide" style="width: 100%; background-color: white; border-radius: .75rem; box-shadow: rgba(0, 0, 0, 0.03) 0px 0.3125rem 0.3125rem -0.15625rem, rgba(0, 0, 0, 0.02) 0px 0.1875rem 0.1875rem -0.09375rem, rgba(0, 0, 0, 0.02) 0px 0.125rem 0.125rem -0.0625rem, rgba(0, 0, 0, 0.03) 0px 0.0625rem 0.0625rem -0.03125rem, rgba(0, 0, 0, 0.04) 0px 0.03125rem 0.03125rem 0px, rgba(0, 0, 0, 0.06) 0px 0px 0px 0.0625rem; padding: 20px;">
      <canvas id="myChart2"></canvas>
    </div>
  </div>
</div><!-- end container -->



<script type="text/javascript">
  // See https://css-tricks.com/draggable-elements-push-others-way/
  $(".slides").sortable({
    placeholder: 'slide-placeholder',
    revert: 150,
    start: function(e, ui){
      placeholderWidth = ui.item.outerWidth();
      placeholderHeight = ui.item.outerHeight();
      ui.placeholder.width(placeholderWidth);
      ui.placeholder.height(placeholderHeight);
      $('<div class="slide-placeholder-animator" data-width="'+placeholderWidth+'" data-height="' + placeholderHeight + '"></div>').insertAfter(ui.placeholder);
    },
    stop: function(e, ui) {  
      $(".slide-placeholder-animator").remove();
    }
  });

  $( ".slide" ).resizable();
</script>

<script type="text/javascript">
  var DATA_COUNT = 12;
  var labels = [];
  for (let i = 0; i < DATA_COUNT; ++i) {
    labels.push(i.toString());
  }
  var datapoints = [0, 20, 20, 60, 60, 120, NaN, 180, 120, 125, 105, 110, 170];

  new Chart(document.getElementById('myChart1'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Cubic interpolation (monotone)',
          data: datapoints,
          borderColor: '#DA3A3A',
          fill: false,
          cubicInterpolationMode: 'monotone',
          tension: 0.4
        }, {
          label: 'Cubic interpolation',
          data: datapoints,
          borderColor: 'blue',
          fill: false,
          tension: 0.4

          label: 'Linear interpolation (default)',

        }

    options: {
      responsive: true,

        title: {
