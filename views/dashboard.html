  <script type="text/javascript">
    const AUTH_COOKIE_NAME = 'sapienza_ltw_auth';
    const DOMAIN = 'localhost';

    function showUserNameOnHeader() {
      const match = document.cookie.match(
        new RegExp("(^| )"+AUTH_COOKIE_NAME+"=([^;]+)")
      );

      if (!match) {
        return null;
      }

      const token = decodeURIComponent(match[2]);

      const parts = token.split(".");

      if (parts.length !== 3) {
        throw new Error("JWT non valido");
      }

      const payloadBase64 = parts[1];

      // Base64URL -> Base64
      const base64 = payloadBase64
        .replace(/-/g, "+")
        .replace(/_/g, "/");

      // Decodifica UTF-8
      var jsonPayload = decodeURIComponent(
        atob(base64)
          .split("")
          .map(c =>
            "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2)
          )
          .join("")
      );

      payload =  JSON.parse(jsonPayload);

      jQuery('#username').html(payload['first_name'])
    }

    function logout(){
      document.cookie = 
        AUTH_COOKIE_NAME + "=;path=/;domain="+DOMAIN+";expires=Thu, 01 Jan 1970 00:00:01 GMT";
      window.location.reload();
    }

    showUserNameOnHeader();

    function formatDateTime(datetime = '') {
      const date = new Date(datetime);

      return date.toLocaleString('it-IT', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    class PageLoader{
      constructor(){
        this.URL_BASE_DIR = '/admin';
        this.urlPaths = this.getUrlPathArray();

        if( this.urlPaths.length >= 2 ){
          return this.load(this.urlPaths.slice(1).join('/') + window.location.search, false);
        }
      }

      getUrlPathArray(){
        var tempPaths = window.location.pathname.split('/');
        var pathArray = [];
        for( var i=0; i<tempPaths.length; i++ ){
          if( tempPaths[i]!=='' ){ pathArray.push(tempPaths[i]); }
        }
        return pathArray;
      }

      load(page, updateHistory = true){
        var progressBarContainer = jQuery('#page-loader');
        var progressBar = jQuery('#page-loader > div');

        var startProgressBar = setTimeout(() => {  
          progressBarContainer.css('display', 'block');
          var width = 1;
          var id = setInterval(() => {
            if (width >= 80) {
              clearInterval(id);
            } else {
              width++;
              progressBar.css('width', width + '%');
            }
          }, 20);
        }, 500);

        jQuery('.page-container').load(this.URL_BASE_DIR+'/'+page, () => {
          clearTimeout(startProgressBar);
          progressBarContainer.css('display', 'none');
          
          if( updateHistory ){
            history.pushState({}, null, this.URL_BASE_DIR+'/'+page);
          }
          this.urlPaths = this.getUrlPathArray();
          jQuery('.main-nav .nav-link').removeClass('active');
          jQuery('.main-nav .nav-link[href="'+this.urlPaths[1]+'"]')
            .addClass('active');
          
          return true;
        });
      }
    }

    var pageLoader = new PageLoader();

    jQuery('.main-nav .nav-link').on('click', function(e){
      e.preventDefault();
      return pageLoader.load(jQuery(this).attr('href'), true);
    });
  </script>
