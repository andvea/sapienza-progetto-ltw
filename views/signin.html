<!DOCTYPE html>
<html>
<head>
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
    crossorigin="anonymous">
  <link 
    rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <style>
    body{
      display: flex;
      align-items: center;
      width: 100vw;
      height: 100vh;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="d-flex flex-grow-1 flex-shrink-0 flex-column w-100" style="max-width: 350px;">
    <i class="bi bi-cloud-fog2-fill" style="font-size: 3rem;"></i>
    <form id="loginForm" method="POST" class="mt-4" action="/signin">
      <div class="d-flex flex-grow-1 align-items-center gap-3 form-floating">
        <input type="email" name="email" class="form-control flex-grow-1">
        <label for="email" class="form-label mb-0">Email</label>
      </div>
      <div class="d-flex flex-grow-1 align-items-center mt-2 gap-3 form-floating">
        <input type="password" name="pwd" class="form-control flex-grow-1">
        <label for="pwd" class="form-label mb-0">Password</label>
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-primary">Accedi</button>
        <button type="button" onclick="location.href='/signup'" class="btn btn-outline-secondary">Registrati</button>
      </div>
    </form>
  </div>
</body>
</html>
